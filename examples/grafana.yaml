# Grafana Cloud override for otlpgen.
#
# otlpgen does NOT read OTEL_EXPORTER_OTLP_HEADERS — Grafana's Basic auth must be
# set here. The token is base64("<instanceID>:<apiToken>"), taken verbatim from
# your stack's "OpenTelemetry" / OTLP credentials page.
#
#   export GRAFANA_OTLP_TOKEN="MTY4N...=="      # the base64 blob, no "Basic " prefix
#   otlpgen --config examples/grafana.yaml
#
otlp:
  url: "https://otlp-gateway-prod-us-east-2.grafana.net/otlp"
  headers:
    Authorization: "Basic ${GRAFANA_OTLP_TOKEN}"
