        templates:
          - "Unmatched transaction detected: {transaction_id} amount={amount} {currency} (age={age_hours}h)"
          - "Reconciliation run {run_id} mismatch rate above threshold: {mismatch_rate}%"
          - "Stripe balance drift detected: expected={expected_balance} actual={actual_balance} {currency}"
          - "Late settlement detected: payout {payout_id} delayed by {delay_hours} hours"
        attributes:
          transaction_id: ["txn-a1b2c3", "txn-d4e5f6", "txn-g7h8i9"]
          amount: [49.99, 125.00, 750.00]
          currency: ["USD", "EUR", "GBP"]
