# OTLPgen default configuration (embedded in the binary).
#
# Everything here can be overridden by a single YAML file passed with
# --config. Maps are deep-merged; lists and scalars are replaced.
#
# Service names (and most identity strings) are templated from `vars`.
# Change `vars.platform` and the whole platform re-skins itself.
# Use `{{var}}` anywhere in any string value. Vars may reference vars.

vars:
  platform: "payment"
  team: "payments"
  env: "prod"
  cluster: "workshop-cluster"
  region: "us-east-1"
  namespace: "production"
  registry: "registry.example.com"
  version: "2.1.0"

  # Service names — derived from platform, override individually if needed.
  api: "{{platform}}-api"
  processor: "{{platform}}-processor"
  reconciliation: "{{platform}}-reconciliation"

# All signals sent via OTLP/HTTP JSON to /v1/logs, /v1/metrics, /v1/traces.
# Auth is vendor-agnostic: set any headers you need. ${ENV} is resolved
# from the environment at runtime.
otlp:
  url: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
  environment: "{{env}}"
  verify_ssl: true
  headers:
    Authorization: "ApiKey ${OTEL_API_KEY}"

services:
  # Map keys (api / processor / reconciliation) are stable internal ids used
  # by trace span `service:`/`parent:` references. The emitted service.name
  # is the templated `name:` field below.
  api:
    name: "{{api}}"
    enabled: true
    rate_per_minute: 40
    tags:
      - "env:{{env}}"
      - "service:{{api}}"
      - "team:{{team}}"
      - "kube_namespace:{{namespace}}"
      - "namespace:{{namespace}}"
      - "kube_cluster_name:{{cluster}}"
      - "kube_deployment:{{api}}"
      - "kube_container_name:api-server"
      - "image_name:{{registry}}/{{api}}"
      - "image_tag:v{{version}}"
      - "kube_ownerref_kind:replicaset"
      - "pod_phase:running"
      - "region:{{region}}"
    hostnames:
      - "worker-node-3a7f2"
      - "worker-node-8b2c4"
      - "worker-node-1d9e6"

    log_patterns:
      - level: "info"
        weight: 10
        templates:
          - "POST /v1/payments/{payment_id}/charge completed in {duration_ms}ms"
          - "GET /v1/payments/{payment_id} returned {status_code} in {duration_ms}ms"
          - "Payment method tokenized for customer {customer_id}"
          - "Refund initiated: transaction={transaction_id} amount={amount} {currency}"
          - "Health check passed - all upstream dependencies healthy"
        attributes:
          payment_id: ["pay-7a2b3c", "pay-8d4e5f", "pay-9g6h7i", "pay-1j2k3l"]
          duration_ms: [12, 45, 88, 150, 230]
          status_code: [200, 201, 204]
          customer_id: ["cust-40912", "cust-50183", "cust-60274", "cust-70365"]
          transaction_id: ["txn-a1b2c3", "txn-d4e5f6", "txn-g7h8i9"]
          amount: [19.99, 49.50, 125.00, 299.99, 750.00]
          currency: ["USD", "EUR", "GBP"]

      - level: "warn"
        weight: 20
        templates:
          - "[K8s] ImagePullBackOff in namespace {{namespace}} - {pod_name} | cluster={{cluster}} region={{region}} service={{api}} image={image} reason=ImagePullBackOff message=Failed to pull image: unauthorized"
          - "[K8s] ImagePullBackOff in namespace {{namespace}} - {pod_name} | image={image} reason=ImagePullBackOff message=Failed to pull image: unauthorized"
          - "source=kubernetes:{{cluster}}:{{namespace}}:pod/{pod_name} | ImagePullBackOff image={image} message=Failed to pull image: unauthorized"
          - "Request latency elevated: {method} {endpoint} took {duration_ms}ms (threshold: {threshold_ms}ms)"
          - "Stripe API response slow: {stripe_latency_ms}ms"
        attributes:
          pod_name: ["{{api}}-6c9d2f4a1-j8n3p", "{{api}}-7d4f8c9b5-x2k9m", "{{api}}-7d4f8c9b5-r3m7q"]
          image: ["{{registry}}/{{api}}:v{{version}}"]
          method: ["POST", "GET", "PUT", "DELETE"]
          endpoint: ["/v1/payments/charge", "/v1/payments/refund", "/v1/methods/tokenize", "/v1/subscriptions"]
          duration_ms: [800, 1200, 2100, 3500]
          threshold_ms: [500]
          stripe_latency_ms: [1500, 2800, 4200]

      - level: "error"
        weight: 60
        templates:
          - "[K8s] Pod CrashLoopBackOff in namespace {{namespace}} - {pod_name} | cluster={{cluster}} region={{region}} service={{api}} container=api-server restart_count={restart_count} last_state=Error exit_code=1"
          - "[K8s] Pod CrashLoopBackOff in namespace {{namespace}} - {pod_name} | container=api-server restart_count={restart_count} last_state=Error exit_code=1"
          - "[K8s] Deployment Rollout Failed in namespace {{namespace}} - {{api}}-deploy | cluster={{cluster}} region={{region}} service={{api}} replicas_desired={replicas_desired} replicas_available={replicas_available} reason=ProgressDeadlineExceeded"
          - "[K8s] Deployment Rollout Failed in namespace {{namespace}} - {{api}}-deploy | replicas_desired={replicas_desired} replicas_available={replicas_available} reason=ProgressDeadlineExceeded"
          - "source=kubernetes:{{cluster}}:{{namespace}}:pod/{pod_name} | CrashLoopBackOff container=api-server restart_count={restart_count} exit_code=1"
          - "source=kubernetes:{{cluster}}:{{namespace}}:deployment/{{api}}-deploy | ProgressDeadlineExceeded replicas_desired={replicas_desired} replicas_available={replicas_available}"
        attributes:
          pod_name: ["{{api}}-7d4f8c9b5-x2k9m", "{{api}}-6c9d2f4a1-j8n3p", "{{api}}-7d4f8c9b5-r3m7q"]
          restart_count: [3, 5, 8, 12]
          replicas_desired: [5]
          replicas_available: [0, 1, 2]

      - level: "debug"
        weight: 5
        templates:
          - "Incoming request: {method} {endpoint} client={client_id}"
          - "Stripe idempotency key generated: {idempotency_key}"
          - "Cache hit for payment method token {token_id}"
          - "JWT claims validated for user {user_id}"
        attributes:
          method: ["POST", "GET", "PUT", "DELETE"]
          endpoint: ["/v1/payments/charge", "/v1/payments/refund", "/v1/methods"]
          client_id: ["client-merchant-01", "client-merchant-02", "client-internal"]
          idempotency_key: ["idk-aaa111", "idk-bbb222", "idk-ccc333"]
          token_id: ["tok-x1y2z3", "tok-a4b5c6"]
          user_id: ["user-10001", "user-10002", "user-10003"]

    metrics:
      - name: "http"
        measurements:
          - name: "http.request.rate"
            min: 20
            max: 120
            baseline: 65
            unit: "req/s"
          - name: "http.request.duration.p50"
            min: 5
            max: 200
            baseline: 45
            unit: "ms"
          - name: "http.request.duration.p95"
            min: 50
            max: 800
            baseline: 180
            unit: "ms"
          - name: "http.request.duration.p99"
            min: 100
            max: 3500
            baseline: 450
            unit: "ms"
          - name: "http.request.error_rate"
            min: 0
            max: 25
            baseline: 8.5
            unit: "%"
      - name: "system"
        measurements:
          - name: "system.cpu.usage"
            min: 10
            max: 95
            baseline: 55
            unit: "%"
          - name: "system.memory.usage"
            min: 200
            max: 512
            baseline: 340
            unit: "MiB"
          - name: "system.memory.usage_pct"
            min: 40
            max: 100
            baseline: 66
            unit: "%"
          - name: "system.network.in"
            min: 0.5
            max: 50
            baseline: 12
            unit: "MiB/s"
          - name: "system.network.out"
            min: 0.2
            max: 30
            baseline: 8
            unit: "MiB/s"
      - name: "kubernetes"
        measurements:
          - name: "kubernetes.pod.restart_count"
            min: 0
            max: 12
            baseline: 5
            unit: ""
          - name: "kubernetes.deployment.replicas_available"
            min: 0
            max: 5
            baseline: 2
            unit: ""
          - name: "kubernetes.deployment.replicas_desired"
            min: 5
            max: 5
            baseline: 5
            unit: ""

  processor:
    name: "{{processor}}"
    enabled: true
    rate_per_minute: 30
    tags:
      - "env:{{env}}"
      - "service:{{processor}}"
      - "team:{{team}}"
      - "kube_namespace:{{namespace}}"
      - "namespace:{{namespace}}"
      - "kube_cluster_name:{{cluster}}"
      - "kube_deployment:{{processor}}"
      - "kube_container_name:{{processor}}"
      - "image_name:{{registry}}/{{processor}}"
      - "image_tag:v{{version}}"
      - "kube_ownerref_kind:replicaset"
      - "pod_phase:running"
      - "region:{{region}}"
    hostnames:
      - "worker-node-3a7f2"
      - "worker-node-8b2c4"

    log_patterns:
      - level: "info"
        weight: 10
        templates:
          - "Job {job_id} completed: {job_type} for payment {payment_id} in {duration_ms}ms"
          - "Batch settlement processed: {batch_size} transactions totaling {batch_total} {currency}"
          - "Webhook dispatched: event={event_type} delivery_id={delivery_id}"
          - "Retry succeeded for job {job_id} on attempt {attempt}"
          - "Queue depth nominal: {queue_name} has {queue_depth} pending jobs"
        attributes:
          job_id: ["job-aa1122", "job-bb3344", "job-cc5566", "job-dd7788"]
          job_type: ["charge", "refund", "settlement", "payout", "webhook_dispatch"]
          payment_id: ["pay-7a2b3c", "pay-8d4e5f", "pay-9g6h7i"]
          duration_ms: [50, 120, 350, 800, 1500]
          batch_size: [25, 50, 100, 250]
          batch_total: [4999.50, 12750.00, 38200.75, 95000.00]
          currency: ["USD", "EUR", "GBP"]
          event_type: ["payment.completed", "refund.processed", "payout.sent", "dispute.created"]
          delivery_id: ["dlv-111aaa", "dlv-222bbb", "dlv-333ccc"]
          attempt: [2, 3]
          queue_name: ["charges", "refunds", "settlements", "webhooks"]
          queue_depth: [3, 12, 45, 120]

      - level: "warn"
        weight: 20
        templates:
          - "[K8s] HPA Max Replicas in namespace {{namespace}} - {{processor}}-autoscaler | cluster={{cluster}} region={{region}} service={{processor}} min_replicas=2 max_replicas=10 current_replicas={current_replicas} cpu_utilization={cpu_utilization}%"
          - "[K8s] HPA Max Replicas in namespace {{namespace}} - {{processor}}-autoscaler | current_replicas={current_replicas} max_replicas=10 cpu_utilization={cpu_utilization}%"
          - "[K8s] PVC Pending in namespace {{namespace}} - data-volume-{{processor}} | cluster={{cluster}} region={{region}} service={{processor}} storage_class=gp3 requested_size=100Gi reason=ProvisioningFailed"
          - "[K8s] PVC Pending in namespace {{namespace}} - data-volume-{{processor}} | storage_class=gp3 requested_size=100Gi reason=ProvisioningFailed"
          - "source=kubernetes:{{cluster}}:{{namespace}}:hpa/{{processor}}-autoscaler | ScalingLimited current_replicas={current_replicas} max_replicas=10 cpu_utilization={cpu_utilization}%"
          - "source=kubernetes:{{cluster}}:{{namespace}}:pvc/data-volume-{{processor}} | Pending storage_class=gp3 requested_size=100Gi reason=ProvisioningFailed"
        attributes:
          current_replicas: [10]
          cpu_utilization: [92, 95, 98]

      - level: "error"
        weight: 60
        templates:
          - "[K8s] Node NotReady in namespace {{namespace}} - {node_name} | cluster={{cluster}} region={{region}} service={{processor}} condition=NotReady kubelet_status=Unknown"
          - "[K8s] Node NotReady in namespace {{namespace}} - {node_name} | condition=NotReady last_heartbeat=2025-01-15T10:30:00.000Z kubelet_status=Unknown"
          - "[K8s] Node NotReady in namespace {{namespace}} - {node_name} | service={{processor}} condition=NotReady kubelet_status=Unknown"
          - "source=kubernetes:{{cluster}}:{{namespace}}:node/{node_name} | NotReady condition=NotReady kubelet_status=Unknown"
        attributes:
          node_name: ["worker-node-3a7f2", "worker-node-8b2c4", "worker-node-1d9e6"]

      - level: "debug"
        weight: 5
        templates:
          - "Worker {worker_id} polling queue {queue_name}"
          - "Job {job_id} dequeued: type={job_type} priority={priority}"
          - "Acquiring database lock for transaction {transaction_id}"
          - "Stripe request: POST /v1/charges idempotency_key={idempotency_key}"
        attributes:
          worker_id: ["worker-01", "worker-02", "worker-03", "worker-04"]
          queue_name: ["charges", "refunds", "settlements", "webhooks"]
          job_id: ["job-aa1122", "job-bb3344", "job-cc5566"]
          job_type: ["charge", "refund", "settlement"]
          priority: ["high", "normal", "low"]
          transaction_id: ["txn-a1b2c3", "txn-d4e5f6", "txn-g7h8i9"]
          idempotency_key: ["idk-aaa111", "idk-bbb222", "idk-ccc333"]

    metrics:
      - name: "jobs"
        measurements:
          - name: "jobs.processed_rate"
            min: 5
            max: 60
            baseline: 30
            unit: "jobs/min"
          - name: "jobs.duration.p50"
            min: 30
            max: 500
            baseline: 120
            unit: "ms"
          - name: "jobs.duration.p95"
            min: 200
            max: 2000
            baseline: 800
            unit: "ms"
          - name: "jobs.failure_rate"
            min: 0
            max: 15
            baseline: 3.5
            unit: "%"
          - name: "jobs.queue_depth"
            min: 0
            max: 250
            baseline: 45
            unit: ""
      - name: "system"
        measurements:
          - name: "system.cpu.usage"
            min: 30
            max: 98
            baseline: 72
            unit: "%"
          - name: "system.memory.usage"
            min: 300
            max: 768
            baseline: 520
            unit: "MiB"
          - name: "system.memory.usage_pct"
            min: 50
            max: 100
            baseline: 78
            unit: "%"
          - name: "system.network.in"
            min: 0.3
            max: 25
            baseline: 6
            unit: "MiB/s"
          - name: "system.network.out"
            min: 0.1
            max: 15
            baseline: 4
            unit: "MiB/s"
      - name: "kubernetes"
        measurements:
          - name: "kubernetes.hpa.current_replicas"
            min: 2
            max: 10
            baseline: 10
            unit: ""
          - name: "kubernetes.hpa.cpu_utilization"
            min: 50
            max: 100
            baseline: 92
            unit: "%"
          - name: "kubernetes.node.ready"
            min: 0
            max: 1
            baseline: 0
            unit: ""

  reconciliation:
    name: "{{reconciliation}}"
    enabled: true
    rate_per_minute: 15
    tags:
      - "env:{{env}}"
      - "service:{{reconciliation}}"
      - "team:{{team}}"
      - "kube_namespace:{{namespace}}"
      - "namespace:{{namespace}}"
      - "kube_cluster_name:{{cluster}}"
      - "kube_cronjob:{{reconciliation}}"
      - "kube_container_name:worker"
      - "image_name:{{registry}}/{{reconciliation}}"
      - "image_tag:v{{version}}"
      - "kube_ownerref_kind:job"
      - "pod_phase:running"
      - "region:{{region}}"
    hostnames:
      - "worker-node-8b2c4"
      - "worker-node-1d9e6"

    log_patterns:
