            baseline: 94
            unit: "%"
      - name: "kubernetes"
        measurements:
          - name: "kubernetes.container.memory_limit"
            min: 512
            max: 512
            baseline: 512
            unit: "MiB"
          - name: "kubernetes.container.memory_usage"
            min: 300
            max: 590
            baseline: 480
            unit: "MiB"
          - name: "kubernetes.service.ready_endpoints"
            min: 0
            max: 3
            baseline: 1
            unit: ""

# ── Distributed trace templates ──────────────────────────────
# Each trace defines spans that flow across services. Spans reference
# services by their internal id (the `services:` map key), so traces
# survive service renames. Operation/name strings can be templated too.
traces:
  - name: "{{platform}}-charge-success"
    weight: 20
    spans:
      - service: "api"
        operation: "POST /v1/payments/charge"
        type: "request"
        duration_ms: 150
        results: ["success"]
        http:
          request: { method: "POST" }
          response: { status_code: 200 }
      - service: "processor"
        operation: "process-charge"
        type: "job"
        duration_ms: 80
        parent: "api"
        results: ["success"]

  - name: "{{platform}}-charge-slow"
    weight: 30
    spans:
      - service: "api"
        operation: "POST /v1/payments/charge"
        type: "request"
        duration_ms: 2500
        results: ["success"]
        http:
          request: { method: "POST" }
          response: { status_code: 200 }
      - service: "processor"
        operation: "process-charge"
        type: "job"
        duration_ms: 1800
        parent: "api"
        results: ["success"]

  - name: "{{platform}}-charge-failure"
    weight: 40
    spans:
      - service: "api"
        operation: "POST /v1/payments/charge"
        type: "request"
        duration_ms: 3500
        results: ["failure", "error"]
        http:
          request: { method: "POST" }
          response: { status_code: 500 }
      - service: "processor"
        operation: "process-charge"
        type: "job"
        duration_ms: 3000
        parent: "api"
        results: ["failure", "error"]

  - name: "{{platform}}-refund"
    weight: 15
    spans:
      - service: "api"
        operation: "POST /v1/payments/refund"
        type: "request"
        duration_ms: 200
        results: ["success"]
        http:
          request: { method: "POST" }
          response: { status_code: 200 }
      - service: "processor"
        operation: "process-refund"
        type: "job"
        duration_ms: 350
        parent: "api"
        results: ["success"]
      - service: "reconciliation"
        operation: "reconcile-refund"
        type: "job"
        duration_ms: 500
        parent: "processor"
        results: ["success"]

  - name: "batch-settlement"
    weight: 10
    spans:
      - service: "processor"
        operation: "batch-settlement"
        type: "job"
        duration_ms: 5000
        results: ["success"]
      - service: "reconciliation"
        operation: "reconcile-settlement"
        type: "job"
        duration_ms: 35000
        parent: "processor"
        results: ["success", "partial"]

  - name: "webhook-dispatch"
    weight: 10
    spans:
      - service: "processor"
        operation: "dispatch-webhook"
        type: "request"
        duration_ms: 120
        results: ["success"]
