          transaction_count: [150, 320, 500]
          net_amount: [12450.00, 28900.50, 67200.75]
          currency: ["USD", "EUR", "GBP"]
          entry_type: ["credit", "debit", "adjustment", "fee", "chargeback"]
          amount: [19.99, 125.00, 499.99, 1250.00]
          available_balance: [45200.00, 89500.50, 125000.00]
