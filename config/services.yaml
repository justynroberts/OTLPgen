          - name: "reconciliation.mismatch_rate"
            min: 0
            max: 10
            baseline: 2.5
            unit: "%"
          - name: "reconciliation.duration"
            min: 5000
            max: 120000
            baseline: 35000
            unit: "ms"
          - name: "reconciliation.transactions_processed"
            min: 500
            max: 5000
            baseline: 2100
