          - "[K8s] Service Endpoint NotReady in namespace {{namespace}} - {{reconciliation}}-svc | port=8080 ready_endpoints={ready_endpoints} total_endpoints=3"
          - "source=kubernetes:{{cluster}}:{{namespace}}:container/{pod_name} | OOMKilled container=worker memory_limit=512Mi memory_usage={memory_usage} exit_code=137"
          - "source=kubernetes:{{cluster}}:{{namespace}}:service/{{reconciliation}}-svc | EndpointNotReady port=8080 ready_endpoints={ready_endpoints} total_endpoints=3"
        attributes:
          pod_name: ["{{reconciliation}}-5b8c1d3e7-q4w2r", "{{reconciliation}}-5b8c1d3e7-k8j3p"]
          memory_usage: ["548Mi", "560Mi", "572Mi", "590Mi"]
          ready_endpoints: [0, 1]

      - level: "debug"
        weight: 5
        templates:
          - "Starting reconciliation run {run_id} for period {period}"
          - "Fetching Stripe transactions: page {page}/{total_pages}"
